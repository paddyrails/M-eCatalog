server:
  port: 9080

# Microservice-level rate limiting (Bucket4j). Use backend=redis in Kubernetes for shared limits across replicas.
catalog:
  rate-limit:
    enabled: true
    # local = in-memory per JVM; redis = distributed (set SPRING_DATA_REDIS_* and CATALOG_RATE_LIMIT_BACKEND=redis in k8s)
    backend: local
    replenish-per-period: 20
    refill-period-seconds: 1
    burst-capacity: 40

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  graphql:
    graphiql:
      enabled: true
  cache:
    type: caffeine
    cache-names: alerts, imports, exports
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cs-sales}
    username: ${DB_USERNAME:cs_sales_user}
    password: ${DB_PASSWORD:cs_sales_user}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AlertPool
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        generate_statistics: true