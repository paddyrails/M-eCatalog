openapi: 3.0.4
info:
  title: M-eCatalog Sales Products API
  description: |
    API for retrieving product catalog by country for Apple CS Sales eCatalog.
  version: 1.0.0
servers:
  - url: /
    description: Default server
tags:
  - name: sales
    description: Sales product catalog operations
paths:
  /api/sales/get/products:
    get:
      tags:
        - sales
      summary: Get products by country
      description: Returns a list of products filtered by country. Response includes Name, Code, Description, and Price.
      operationId: getProducts
      parameters:
        - name: country
          in: query
          description: Country code to filter products
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '400':
          description: Invalid request (e.g. missing country)
        default:
          description: Unexpected error
components:
  schemas:
    Product:
      type: object
      properties:
        name:
          type: string
          description: Product name
        code:
          type: string
          description: Product code
        description:
          type: string
          description: Product description
        price:
          type: number
          format: double
          description: Product price
